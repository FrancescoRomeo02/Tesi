StylesPath = .vale/styles
MinAlertLevel = suggestion

[*.tex]
BasedOnStyles = Tesi
BlockIgnores = (?s)\\begin\{lstlisting\}.*?\\end\{lstlisting\}, (?s)\\begin\{verbatim\}.*?\\end\{verbatim\}, (?s)\\begin\{figure\}.*?\\end\{figure\}, (?s)\\begin\{table\}.*?\\end\{table\}, (?s)\\begin\{equation\}.*?\\end\{equation\}, (?s)\\begin\{align\}.*?\\end\{align\}
TokenIgnores = \\[A-Za-z]+(\[[^\]]*\])?(\{[^}]*\})?, \\\\?[A-Za-z]+, https?://\S+, [A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}
